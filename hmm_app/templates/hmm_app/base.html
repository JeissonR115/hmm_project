<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}HMM App{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f7fa; color: #222; }
    nav {
      background: #1a237e; color: #fff; padding: 0.75rem 1.5rem;
      display: flex; align-items: center; gap: 1.5rem;
    }
    nav a { color: #c5cae9; text-decoration: none; font-size: 0.95rem; }
    nav a:hover { color: #fff; }
    nav .brand { font-weight: 700; font-size: 1.1rem; color: #fff; margin-right: auto; }
    .container { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.6rem; margin-bottom: 1.25rem; color: #1a237e; }
    h2 { font-size: 1.2rem; margin-bottom: 0.75rem; color: #283593; }
    .card {
      background: #fff; border-radius: 8px; padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 1.25rem;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
    th { background: #e8eaf6; text-align: left; padding: 0.5rem 0.75rem; }
    td { padding: 0.45rem 0.75rem; border-bottom: 1px solid #eee; }
    tr:last-child td { border-bottom: none; }
    .btn {
      display: inline-block; padding: 0.45rem 1rem; border-radius: 5px;
      font-size: 0.9rem; text-decoration: none; cursor: pointer; border: none;
    }
    .btn-primary   { background: #1a237e; color: #fff; }
    .btn-secondary { background: #e8eaf6; color: #1a237e; }
    .btn-danger    { background: #c62828; color: #fff; }
    .btn:hover { opacity: 0.88; }
    .field {
      width: 100%; padding: 0.4rem 0.6rem; border: 1px solid #ccd;
      border-radius: 4px; font-size: 0.92rem; margin-top: 0.2rem;
    }
    .field:focus { outline: 2px solid #3949ab; border-color: #3949ab; }
    label { font-size: 0.85rem; font-weight: 600; color: #444; }
    .form-group { margin-bottom: 0.85rem; }
    .error-list { color: #c62828; font-size: 0.82rem; margin-top: 0.2rem; }
    .messages { list-style: none; margin-bottom: 1rem; }
    .messages li {
      padding: 0.6rem 1rem; border-radius: 5px; margin-bottom: 0.4rem; font-size: 0.9rem;
    }
    .messages .success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #43a047; }
    .messages .error   { background: #ffebee; color: #c62828; border-left: 4px solid #e53935; }
    .badge {
      display: inline-block; font-size: 0.78rem; padding: 0.2rem 0.55rem;
      border-radius: 12px; font-weight: 600;
    }
    .badge-state0 { background: #e3f2fd; color: #1565c0; }
    .badge-state1 { background: #fff8e1; color: #e65100; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; }
    .pagination { display: flex; gap: 0.5rem; align-items: center; margin-top: 1rem; }
    .pagination a, .pagination span {
      padding: 0.35rem 0.75rem; border-radius: 4px;
      background: #e8eaf6; color: #1a237e; text-decoration: none; font-size: 0.88rem;
    }
    .pagination .current { background: #1a237e; color: #fff; }
    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">HMM App</span>
    <a href="{% url 'lista' %}">Experimentos</a>
    <a href="{% url 'crear' %}">+ Nuevo</a>
    <a href="{% url 'simulador' %}">Simulador</a>
  </nav>
  <div class="container">
    {% if messages %}
      <ul class="messages">
        {% for m in messages %}
          <li class="{{ m.tags }}">{{ m }}</li>
        {% endfor %}
      </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
