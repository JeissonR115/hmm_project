{% extends "hmm_app/base.html" %}
{% block title %}Eliminar {{ exp.nombre }} — HMM App{% endblock %}

{% block content %}
<h1>Eliminar experimento</h1>
<div class="card" style="max-width:480px;">
  <p style="margin-bottom:1rem;">
    ¿Estás seguro de que deseas eliminar <strong>{{ exp.nombre }}</strong>?
    Esta acción no se puede deshacer.
  </p>
  <form method="post">
    {% csrf_token %}
    <div class="actions">
      <button type="submit" class="btn btn-danger">Sí, eliminar</button>
      <a href="{% url 'detalle' exp.pk %}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
